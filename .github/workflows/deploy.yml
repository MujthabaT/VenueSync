name: Deploy VenueSync to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/VenueSync
            git pull origin main
            echo "${{ secrets.ENV_FILE }}" > .env
            docker compose down
            docker compose up -d --build
